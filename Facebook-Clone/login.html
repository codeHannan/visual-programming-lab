<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook | Log In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231877F2'/%3E%3Ctext x='50' y='78' font-size='75' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3Ef%3C/text%3E%3C/svg%3E" type="image/svg+xml">
</head>
<body>

  <div class="login-wrapper">

    <div class="branding">
      <h1>facebook</h1>
      <p>Facebook helps you connect and share with the people in your life.</p>
    </div>

    <div class="login-card">
      <form action="home.html" method="get">
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Email address or phone number" required>
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-login">Log In</button>
      </form>
      <a href="#" class="forgot-link">Forgotten password?</a>
      <div class="divider"></div>
      <a href="#" class="btn btn-create">Create new account</a>
      <p class="page-note"><a href="#">Create a Page</a> for a celebrity, brand or business.</p>
    </div>

  </div>

  <footer class="login-footer">
    <div class="footer-links">
      <a href="#">English (UK)</a>
      <a href="#">اردو</a>
      <a href="#">العربية</a>
      <a href="#">हिन्दी</a>
      <a href="#">Français</a>
    </div>
    <div class="footer-copy">Facebook © 2026</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
