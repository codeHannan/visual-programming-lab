<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml, <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='12' width='100' height='100' fill='%23222'/><rect x='15' y='10' rx='6' width='70' height='25' fill='%23fff'/><rect x='15' y='45' rx='3' width='15' height='15' fill='%23ff9500'/><rect x='42' y='45' rx='3' width='15' height='15' fill='%23ff9500'/><rect x='69' y='45' rx='3' width='15' height='15' fill='%23ff9500'/><rect x='15' y='70' rx='3' width='15' height='15' fill='%23fff'/><rect x='42' y='70' rx='3' width='15' height='15' fill='%23fff'/><rect x='69' y='70' rx='3' width='15' height='15' fill='%23fff'/></svg>" type="image/svg+xml">
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="btn op" onclick="clearDisplay()">C</button>
      <button class="btn op" onclick="toggleSign()">±</button>
      <button class="btn op" onclick="appendToDisplay('%')">%</button>
      <button class="btn op" onclick="appendToDisplay('/')">÷</button>

      <button class="btn" onclick="appendToDisplay('7')">7</button>
      <button class="btn" onclick="appendToDisplay('8')">8</button>
      <button class="btn" onclick="appendToDisplay('9')">9</button>
      <button class="btn op" onclick="appendToDisplay('*')">×</button>

      <button class="btn" onclick="appendToDisplay('4')">4</button>
      <button class="btn" onclick="appendToDisplay('5')">5</button>
      <button class="btn" onclick="appendToDisplay('6')">6</button>
      <button class="btn op" onclick="appendToDisplay('-')">−</button>

      <button class="btn" onclick="appendToDisplay('1')">1</button>
      <button class="btn" onclick="appendToDisplay('2')">2</button>
      <button class="btn" onclick="appendToDisplay('3')">3</button>
      <button class="btn op" onclick="appendToDisplay('+')">+</button>

      <button class="btn zero" onclick="appendToDisplay('0')">0</button>
      <button class="btn" onclick="appendToDisplay('.')">.</button>
      <button class="btn equals" onclick="calculate()">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
